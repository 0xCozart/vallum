<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vallum Architecture</title>
  <style>
    body { margin: 0; background: #020617; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .card { border: 1px solid #1e293b; border-radius: 18px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.35); }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <main>
    <div class="card" aria-label="Vallum architecture diagram">
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Vallum Architecture</title>
  <desc id="desc">Architecture diagram showing demo app, TypeScript SDK, policy gateway, usage store, operator dashboard, IOTA Gas Station, IOTA RPC, and observability components.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399" />
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fb7185" />
    </marker>
    <style>
      .bg { fill: #020617; }
      .title { fill: #e2e8f0; font: 700 28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .subtitle { fill: #94a3b8; font: 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .label { fill: #f8fafc; font: 700 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .sublabel { fill: #cbd5e1; font: 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .tiny { fill: #94a3b8; font: 10px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .frontend { fill: rgba(8, 51, 68, 0.55); stroke: #22d3ee; stroke-width: 1.7; }
      .backend { fill: rgba(6, 78, 59, 0.55); stroke: #34d399; stroke-width: 1.7; }
      .database { fill: rgba(76, 29, 149, 0.55); stroke: #a78bfa; stroke-width: 1.7; }
      .cloud { fill: rgba(120, 53, 15, 0.45); stroke: #fbbf24; stroke-width: 1.7; }
      .security { fill: rgba(136, 19, 55, 0.5); stroke: #fb7185; stroke-width: 1.7; }
      .external { fill: rgba(30, 41, 59, 0.65); stroke: #94a3b8; stroke-width: 1.7; }
      .mask { fill: #0f172a; stroke: none; }
      .flow { fill: none; stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
      .flow-green { fill: none; stroke: #34d399; stroke-width: 2; marker-end: url(#arrow-green); }
      .flow-rose { fill: none; stroke: #fb7185; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow-rose); }
      .boundary { fill: none; stroke: #fbbf24; stroke-width: 1.5; stroke-dasharray: 8 5; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <rect width="1280" height="760" fill="url(#grid)" opacity="0.75"/>

  <text x="60" y="58" class="title">Vallum Open-Source Toolkit</text>
  <text x="60" y="84" class="subtitle">Deployment + policy gateway + SDK + dashboard + observability around IOTA Gas Station</text>

  <!-- flows behind boxes -->
  <path class="flow" d="M 218 230 L 280 230"/>
  <path class="flow" d="M 440 230 L 502 230"/>
  <path class="flow-green" d="M 705 230 L 785 230"/>
  <path class="flow-green" d="M 985 230 L 1060 230"/>
  <path class="flow" d="M 610 290 L 610 365"/>
  <path class="flow" d="M 705 260 C 780 315 790 405 735 455"/>
  <path class="flow" d="M 540 290 C 470 340 465 405 520 455"/>
  <path class="flow-rose" d="M 610 365 L 610 306"/>

  <!-- boundary -->
  <rect x="480" y="145" width="545" height="390" rx="14" class="boundary"/>
  <text x="500" y="172" class="tiny">Vallum controlled infrastructure boundary</text>

  <!-- components -->
  <rect x="70" y="180" width="150" height="100" rx="8" class="mask"/><rect x="70" y="180" width="150" height="100" rx="8" class="frontend"/>
  <text x="92" y="218" class="label">Demo dApp</text>
  <text x="92" y="240" class="sublabel">User triggers</text>
  <text x="92" y="258" class="sublabel">gasless action</text>

  <rect x="285" y="180" width="155" height="100" rx="8" class="mask"/><rect x="285" y="180" width="155" height="100" rx="8" class="frontend"/>
  <text x="312" y="218" class="label">TS SDK</text>
  <text x="312" y="240" class="sublabel">reserveGas()</text>
  <text x="312" y="258" class="sublabel">executeSponsored()</text>

  <rect x="505" y="175" width="205" height="110" rx="8" class="mask"/><rect x="505" y="175" width="205" height="110" rx="8" class="backend"/>
  <text x="530" y="214" class="label">Policy Gateway</text>
  <text x="530" y="237" class="sublabel">auth • quotas • allowlists</text>
  <text x="530" y="255" class="sublabel">structured reason codes</text>

  <rect x="790" y="180" width="195" height="100" rx="8" class="mask"/><rect x="790" y="180" width="195" height="100" rx="8" class="backend"/>
  <text x="818" y="218" class="label">IOTA Gas Station</text>
  <text x="818" y="240" class="sublabel">reserve gas</text>
  <text x="818" y="258" class="sublabel">sponsor execution</text>

  <rect x="1065" y="180" width="150" height="100" rx="8" class="mask"/><rect x="1065" y="180" width="150" height="100" rx="8" class="external"/>
  <text x="1102" y="218" class="label">IOTA RPC</text>
  <text x="1102" y="240" class="sublabel">testnet</text>
  <text x="1102" y="258" class="sublabel">mainnet later</text>

  <rect x="500" y="375" width="220" height="100" rx="8" class="mask"/><rect x="500" y="375" width="220" height="100" rx="8" class="database"/>
  <text x="528" y="414" class="label">Usage Store</text>
  <text x="528" y="436" class="sublabel">apps • policies • events</text>
  <text x="528" y="454" class="sublabel">wallet/app/status usage</text>

  <rect x="760" y="390" width="210" height="100" rx="8" class="mask"/><rect x="760" y="390" width="210" height="100" rx="8" class="frontend"/>
  <text x="790" y="429" class="label">Operator Dashboard</text>
  <text x="790" y="451" class="sublabel">health • quota • logs</text>
  <text x="790" y="469" class="sublabel">policy visibility</text>

  <rect x="250" y="390" width="200" height="100" rx="8" class="mask"/><rect x="250" y="390" width="200" height="100" rx="8" class="cloud"/>
  <text x="280" y="429" class="label">Observability</text>
  <text x="280" y="451" class="sublabel">metrics • alerts</text>
  <text x="280" y="469" class="sublabel">Grafana templates</text>

  <rect x="500" y="575" width="680" height="95" rx="10" fill="rgba(15,23,42,0.8)" stroke="#334155" stroke-width="1.2"/>
  <text x="525" y="610" class="label">Grant-funded open-source core</text>
  <text x="525" y="635" class="sublabel">Deployment kit • policy gateway • SDK • examples • operator dashboard • observability • hardening docs</text>
  <text x="525" y="655" class="tiny">Future managed hosting/support is documented separately and is not required for the toolkit to be useful.</text>

  <rect x="65" y="575" width="370" height="95" rx="10" fill="rgba(15,23,42,0.8)" stroke="#334155" stroke-width="1.2"/>
  <text x="90" y="610" class="label">Safety model</text>
  <text x="90" y="635" class="sublabel">Sponsor keys stay server-side</text>
  <text x="90" y="655" class="sublabel">Policy rejects unsafe sponsorship before Gas Station</text>
</svg>

    </div>
  </main>
</body>
</html>
