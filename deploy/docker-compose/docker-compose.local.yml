services:
  redis:
    image: redis:7-alpine
    container_name: agentrail-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  gas-station:
    image: ${IOTA_GAS_STATION_IMAGE:-iotaledger/gas-station:latest}
    container_name: agentrail-gas-station
    command: ["--config-path", "/app/config.yaml"]
    depends_on:
      - redis
    ports:
      - "127.0.0.1:9527:9527"
      - "127.0.0.1:9184:9184"
    environment:
      GAS_STATION_AUTH: ${GAS_STATION_AUTH:-}
      RUST_BACKTRACE: "1"
    volumes:
      - ${AGENTRAIL_GAS_STATION_CONFIG:-../gas-station/config.local.yaml}:/app/config.yaml:ro

volumes:
  redis_data:
